<!DOCTYPE html>
<html>
<head>
    <title>LCBuddy2 — MultiBox</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background: #000; color: #ddd; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; overflow: hidden; }
        #mbx-tabbar { display: flex; align-items: center; gap: 6px; height: 34px; padding: 0 8px; background: #111; border-bottom: 1px solid #333; position: relative; z-index: 100; overflow-x: auto; white-space: nowrap; }
        #mbx-grid-btn, .mbx-chip { background: #1a1a1a; color: #ddd; border: 1px solid #333; border-radius: 12px; padding: 3px 10px; font: inherit; cursor: pointer; }
        #mbx-grid-btn.active, .mbx-chip.active { background: #07330a; color: #5be05b; border-color: #04A800; }
        #mbx-wall { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px; align-content: flex-start; height: calc(100vh - 34px); overflow-y: auto; box-sizing: border-box; }
        .mbx-slot { width: 300px; height: 169px; overflow: hidden; position: relative; border: 1px solid #2c2c2c; border-radius: 4px; background: #000; cursor: pointer; }
        .mbx-slot.is-hidden { display: none; }
        .mbx-slot.is-focused { position: fixed; inset: 0; width: 100vw; height: 100vh; border: 0; border-radius: 0; z-index: 50; cursor: default; }
        .mbx-scaler { width: 1100px; height: 620px; transform-origin: top left; }
        .mbx-frame { width: 1100px; height: 620px; border: 0; display: block; }
        .mbx-addtile { display: flex; align-items: center; justify-content: center; font-size: 48px; color: #555; cursor: pointer; }
        .mbx-addtile:hover { color: #04A800; border-color: #04A800; }
        #mbx-addform { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.6); z-index: 200; }
        #mbx-addform[hidden] { display: none; }
        .mbx-card { background: #141414; border: 1px solid #444; border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 8px; width: 260px; }
        .mbx-card input { background: #1a1a1a; color: #ddd; border: 1px solid #333; border-radius: 3px; padding: 5px 7px; font: inherit; }
        .mbx-card .row { display: flex; gap: 6px; }
        .mbx-card button { flex: 1; background: #1a1a1a; color: #ddd; border: 1px solid #333; border-radius: 3px; padding: 5px; font: inherit; cursor: pointer; }
        #mbx-add-go { border-color: #04A800; color: #5be05b; }
    </style>
</head>
<body>
    <div id="mbx-tabbar">
        <button id="mbx-grid-btn" class="active">▦ Wall</button>
        <span id="mbx-tabs"></span>
    </div>
    <div id="mbx-wall">
        <div id="mbx-add" class="mbx-slot mbx-addtile">+</div>
    </div>
    <div id="mbx-addform" hidden>
        <div class="mbx-card">
            <div>Add a bot</div>
            <input id="mbx-user" placeholder="username" autocomplete="off">
            <input id="mbx-pass" type="password" placeholder="password" autocomplete="off">
            <div class="row">
                <button id="mbx-add-go">Add</button>
                <button id="mbx-add-cancel">Cancel</button>
            </div>
        </div>
    </div>
    <script type="module" src="./bot/multibox.js"></script>
</body>
</html>
