<!DOCTYPE html>
<html>
<head>
    <title>rs2b0t — MultiBox</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background: #000; color: #ddd; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; overflow: hidden; }

        /* app = a big ACTIVE pane on the left + a fixed-width rail of live thumbnails on the right */
        #mbx-app { display: flex; height: 100vh; }
        #mbx-main { flex: 1 1 auto; min-width: 0; position: relative; background: #0a0a0a; }
        /* RAIL_W below must match RAIL_W in DomSlotOps.ts (focused-slot geometry depends on it) */
        #mbx-rail { flex: 0 0 264px; width: 264px; box-sizing: border-box; height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 12px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }

        /* a rail tile: name + status dot over a live game frame cropped to the game viewport */
        .mbx-slot { width: 236px; flex: 0 0 auto; border: 1px solid #2c2c2c; border-radius: 4px; background: #000; cursor: pointer; overflow: hidden; }
        .mbx-slot:hover { border-color: #04A800; }
        .mbx-slot.is-focused { border-color: #04A800; }
        .mbx-cap { display: flex; align-items: center; gap: 6px; padding: 3px 7px; background: #1a1a1a; }
        .mbx-slot.is-focused .mbx-cap { background: #07330a; color: #5be05b; }
        .mbx-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex: 0 0 auto; }
        .mbx-dot.is-online { background: #04A800; }
        .mbx-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        /* TILE_W/TILE_H below must match TILE_W/TILE_H in DomSlotOps.ts (crop math depends on it) */
        .mbx-body { position: relative; width: 236px; height: 155px; background: #000; }
        .mbx-clip { position: absolute; inset: 0; overflow: hidden; background: #000; }
        .mbx-scaler { width: 1100px; height: 620px; transform-origin: top left; }
        .mbx-frame { width: 1100px; height: 620px; border: 0; display: block; }
        /* shown only for the focused bot, whose own iframe is busy filling the main pane */
        .mbx-mirror { position: absolute; inset: 0; display: none; }
        /* the iframe swallows clicks, so this overlay is what makes a tile clickable */
        .mbx-hit { position: absolute; inset: 0; z-index: 3; }

        /* Focused: only the clip (holding the live iframe) is lifted over the main pane.
           It is never reparented, so the game session survives the switch — and the tile
           keeps its place in the rail, mirroring that canvas. */
        .mbx-slot.is-focused .mbx-clip { position: fixed; top: 0; left: 0; bottom: 0; right: 264px; width: auto; height: auto; z-index: 40; }
        .mbx-slot.is-focused .mbx-mirror { display: block; }

        .mbx-addtile { display: flex; align-items: center; justify-content: center; height: 52px; flex: 0 0 auto; font-size: 14px; color: #666; border: 1px dashed #444; border-radius: 4px; cursor: pointer; }
        .mbx-addtile:hover { color: #04A800; border-color: #04A800; }
    </style>
</head>
<body>
    <div id="mbx-app">
        <div id="mbx-main"></div>
        <div id="mbx-rail">
            <div id="mbx-add" class="mbx-addtile">+ add bot</div>
        </div>
    </div>
    <script type="module" src="./bot/multibox.js"></script>
</body>
</html>
