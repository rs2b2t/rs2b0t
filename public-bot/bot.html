<!DOCTYPE html>
<html>

<head>
    <title>rs2b0t</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.7">

    <style>
        body,
        td,
        p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: white;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        /* full-viewport row: game fills the left, panel fixed on the right */
        #rs2b0t-root {
            display: flex;
            align-items: stretch;
            gap: 8px;
            height: 100vh;
            box-sizing: border-box;
        }

        #game-wrap {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* JS sizes this to the largest 765:503 box that fits #game-wrap;
           both canvases fill it, so they scale together and stay aligned. */
        #game-stage {
            position: relative;
            width: 765px;
            height: 503px;
        }

        #game-stage canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
            image-rendering: pixelated;
        }

        #overlay {
            pointer-events: none;
            z-index: 2;
        }

        /* ---- bot panel ---- */

        #bot-panel {
            width: 330px;
            flex: 0 0 330px;
            height: 100vh;
            overflow-y: auto;
            box-sizing: border-box;
            background: #111;
            border-left: 1px solid #333;
            padding: 10px;
            font-family: ui-monospace, Menlo, Consolas, monospace;
            font-size: 12px;
            color: #ddd;
        }

        .rs2b0t-title {
            font-weight: bold;
            font-size: 14px;
            color: #04A800;
            margin-bottom: 8px;
        }

        .rs2b0t-banner {
            padding: 4px 6px;
            border-radius: 3px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .rs2b0t-banner-warn {
            background: #333007;
            color: #e0d75b;
        }

        .rs2b0t-banner-error {
            background: #3a0a0a;
            color: #ff7b7b;
        }

        .rs2b0t-section {
            margin-bottom: 10px;
        }

        .rs2b0t-section-title {
            color: #888;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 4px;
            padding-bottom: 2px;
        }

        .rs2b0t-row {
            display: flex;
            justify-content: space-between;
            line-height: 1.6;
        }

        .rs2b0t-key {
            color: #777;
        }

        .rs2b0t-value {
            color: #ddd;
            text-align: right;
        }

        .rs2b0t-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px 8px;
        }

        .rs2b0t-stat {
            display: flex;
            justify-content: space-between;
            line-height: 1.5;
        }

        .rs2b0t-stat-name {
            color: #777;
            text-transform: capitalize;
        }

        .rs2b0t-chat-line {
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rs2b0t-dim {
            color: #555;
        }

        .rs2b0t-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }

        .rs2b0t-button {
            flex: 1;
            background: #1a1a1a;
            color: #ddd;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 4px 0;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .rs2b0t-button:hover:not(:disabled) {
            background: #252525;
            border-color: #04A800;
        }

        .rs2b0t-button:disabled {
            color: #555;
            cursor: default;
        }

        .rs2b0t-state-running {
            color: #5be05b;
        }

        .rs2b0t-state-paused {
            color: #e0d75b;
        }

        .rs2b0t-state-stopping {
            color: #e0d75b;
        }

        .rs2b0t-state-crashed {
            color: #ff7b7b;
        }

        .rs2b0t-log {
            height: 150px;
            overflow-y: auto;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 3px;
            padding: 4px;
            font-size: 11px;
        }

        .rs2b0t-log-line {
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .rs2b0t-log-warn {
            color: #e0d75b;
        }

        .rs2b0t-log-error {
            color: #ff7b7b;
        }

        .rs2b0t-input {
            flex: 1;
            background: #1a1a1a;
            color: #ddd;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 4px 6px;
            font-family: inherit;
            font-size: 11px;
            min-width: 0;
        }

        .rs2b0t-load-status {
            font-size: 11px;
            color: #777;
            min-height: 14px;
            margin-top: 2px;
        }

        .rs2b0t-load-ok {
            color: #5be05b;
        }

        .rs2b0t-load-error {
            color: #ff7b7b;
        }

        .rs2b0t-setting {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            line-height: 1.9;
        }

        .rs2b0t-setting-bool {
            justify-content: flex-start;
        }

        .rs2b0t-setting-label {
            color: #aaa;
        }

        .rs2b0t-setting .rs2b0t-input {
            max-width: 150px;
            /* long labels must wrap, not crush the input to nothing */
            min-width: 64px;
        }

        .rs2b0t-setting input[type="checkbox"] {
            accent-color: #04A800;
        }

        .rs2b0t-current-script {
            flex: 1;
            align-self: center;
            color: #7ad0ff;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ---- script library modal ---- */
        .rs2b0t-modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .rs2b0t-modal {
            width: min(720px, 86vw);
            max-height: 82vh;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(17, 17, 17, 0.97);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .rs2b0t-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rs2b0t-modal-title {
            font-size: 15px;
            font-weight: bold;
            color: #04A800;
        }

        .rs2b0t-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .rs2b0t-chip {
            background: #1a1a1a;
            color: #bbb;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 2px 10px;
            font: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .rs2b0t-chip:hover {
            border-color: #04A800;
        }

        .rs2b0t-chip-active {
            background: #07330a;
            color: #5be05b;
            border-color: #04A800;
        }

        .rs2b0t-library-list {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
        }

        .rs2b0t-library-card {
            background: #161616;
            border: 1px solid #2c2c2c;
            border-radius: 4px;
            padding: 8px 10px;
            cursor: pointer;
        }

        .rs2b0t-library-card:hover {
            border-color: #04A800;
            background: #1c2419;
        }

        .rs2b0t-card-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .rs2b0t-card-name {
            color: #7ad0ff;
            font-weight: bold;
        }

        .rs2b0t-card-cat {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rs2b0t-card-desc {
            color: #ccc;
            font-size: 11px;
            margin-top: 2px;
        }

        .rs2b0t-card-tags {
            color: #6a8a5a;
            font-size: 10px;
            margin-top: 3px;
        }

        /* parameters: read-only panel summary */
        .rs2b0t-param-summary { display: flex; flex-wrap: wrap; gap: 3px 10px; font: 11px ui-monospace, monospace; margin-bottom: 8px; }
        .rs2b0t-param-sitem { white-space: nowrap; }
        .rs2b0t-param-skey { color: #7d8590; }
        .rs2b0t-param-sval { color: #fff; margin-left: 4px; }
        .rs2b0t-param-edit { width: 100%; color: #ffb86c; }

        /* parameters modal body */
        .rs2b0t-params-body { padding: 4px 4px 8px; max-height: 60vh; overflow: auto; }
        .rs2b0t-param-row { padding: 10px 4px; border-bottom: 1px solid #23282f; }
        .rs2b0t-param-row:last-child { border-bottom: 0; }
        .rs2b0t-param-label { font: 600 12px ui-sans-serif, system-ui; color: #cdd3da; }
        .rs2b0t-param-help { font: 11px ui-sans-serif, system-ui; color: #7d8590; margin-top: 1px; }
        .rs2b0t-param-control { margin-top: 8px; }
        /* dark-theme the control inputs (native inputs render light inside the dark modal otherwise) */
        .rs2b0t-param-text, .rs2b0t-param-select, .rs2b0t-param-num, .rs2b0t-param-tilein, .rs2b0t-param-tagadd { background: #1a1a1a; color: #ddd; border: 1px solid #333; border-radius: 3px; padding: 4px 6px; }
        .rs2b0t-param-cb { accent-color: #9be05b; }

        /* slider */
        .rs2b0t-ctl-slider { display: flex; align-items: center; gap: 10px; }
        .rs2b0t-param-range { flex: 1; min-width: 120px; accent-color: #ffb86c; }
        .rs2b0t-param-num { width: 60px; text-align: center; }
        .rs2b0t-param-rangelbl { font: 10px ui-monospace, monospace; color: #7d8590; }

        /* chips (multiselect + taglist) */
        .rs2b0t-ctl-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .rs2b0t-param-chip { display: inline-flex; align-items: center; gap: 5px; border: 1px solid #2a2f36; border-radius: 14px; padding: 3px 10px; font: 12px ui-sans-serif, system-ui; color: #cdd3da; cursor: pointer; }
        .rs2b0t-param-chip input { margin: 0; accent-color: #9be05b; }
        .rs2b0t-param-tag { display: inline-flex; align-items: center; gap: 6px; background: #22272e; border: 1px solid #2a2f36; border-radius: 14px; padding: 3px 10px; font: 12px ui-sans-serif, system-ui; color: #cdd3da; }
        .rs2b0t-param-tagx { background: none; border: 0; color: #7d8590; cursor: pointer; padding: 0; }
        .rs2b0t-param-tagadd { width: 80px; }

        /* tile */
        .rs2b0t-ctl-tile { display: flex; gap: 8px; }
        .rs2b0t-param-tilef { display: inline-flex; align-items: center; gap: 5px; font: 11px ui-monospace, monospace; color: #7d8590; }
        .rs2b0t-param-tilein { width: 66px; }
    </style>
</head>

<body>
    <div id="rs2b0t-root">
        <div id="game-wrap">
            <div id="game-stage">
                <canvas id="canvas" width="765" height="503">
                    Your browser is not capable of running our web client.
                </canvas>
                <canvas id="overlay" width="765" height="503"></canvas>
            </div>
        </div>
        <div id="bot-panel"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');

        if (canvas) {
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Loading...', canvas.width / 2, canvas.height / 2);
        }

        // Scale the game (backing stays 765x503; the client maps mouse coords
        // by the displayed size, so input stays correct) to the largest
        // aspect-preserving box that fits the window. Kills the blank margins.
        (function () {
            const wrap = document.getElementById('game-wrap');
            const stage = document.getElementById('game-stage');
            function fit() {
                const w = wrap.clientWidth;
                const h = wrap.clientHeight;
                if (w <= 0 || h <= 0) return;
                const scale = Math.min(w / 765, h / 503);
                stage.style.width = Math.floor(765 * scale) + 'px';
                stage.style.height = Math.floor(503 * scale) + 'px';
            }
            window.addEventListener('resize', fit);
            fit();
        })();
    </script>

    <script type="module" src="./bot/botclient.js"></script>
</body>

</html>
